<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Rock Paper Scissors</h1>
        
        <div class="game-container">
            <!-- Score Board at the Top -->
            <div class="score-board">
                <div class="score">
                    <p id="user-score">0</p>
                    <p>You</p>
                </div>
                
                <div class="vs">
                    <span>VS</span>
                </div>

                <div class="score">
                    <p id="comp-score">0</p>
                    <p>Comp</p>
                </div>
            </div>
            
            <div class="round-counter">
                <p>Round: <span id="round-count">1</span>/20</p>
            </div>
            
            <!-- Choices at the Bottom -->
            <div class="choices">
                <div class="choice" id="rock">
                    <div class="icon">
                        <i class="fa-solid fa-hand-fist"></i>
                    </div>
                    <p>Rock</p>
                </div>
                <div class="choice" id="paper">
                    <div class="icon">
                        <i class="fa-solid fa-hand"></i>
                    </div>
                    <p>Paper</p>
                </div>
                <div class="choice" id="scissors">
                    <div class="icon">
                        <i class="fa-solid fa-hand-scissors"></i>
                    </div>
                    <p>Scissors</p>
                </div>
            </div>
            
            <div class="msg-container">
                <p id="msg">Play your move</p>
            </div>
            
            <div class="buttons">
                <button id="reset-btn">Reset Game</button>
                <button id="auto-play-btn">Auto Play</button>
            </div>
        </div>
    </div>

    <!-- Fireworks Container -->
    <div class="fireworks-container" id="fireworks-container"></div>

    <!-- Winner Announcement Overlay -->
    <div class="winner-overlay" id="winner-overlay">
        <div class="winner-content">
            <h2 id="winner-text">Game Over!</h2>
            <p id="winner-message">The game has ended after 20 rounds.</p>
            <button id="play-again-btn">Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
